# =============================================================================
# Restaurant Frontend — nginx config
#
# - Serves the Vite SPA from /usr/share/nginx/html
# - Fallback to index.html for client-side routing (react-router-dom)
# - Reverse-proxies /api/ and /uploads/ to the backend service "app"
#   so the browser uses a single origin (no CORS, no absolute URLs).
#
# The upstream host "app" is resolved via docker network DNS.
# Override via UPSTREAM_API if you embed nginx outside compose.
# =============================================================================

upstream backend_api {
    server app:8080;
}

server {
    listen       80;
    server_name  _;

    # Body size for multipart uploads (images). Keep in sync with
    # STORAGE_MAX_FILE_SIZE_MB on the backend.
    client_max_body_size 20m;

    # Gzip text assets — images already compressed
    gzip on;
    gzip_types text/plain text/css application/json application/javascript
               text/xml application/xml application/xml+rss text/javascript
               image/svg+xml;
    gzip_min_length 1024;

    root   /usr/share/nginx/html;
    index  index.html;

    # ── API proxy ────────────────────────────────────────────────────────────
    location /api/ {
        proxy_pass         http://backend_api;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # ── Uploads proxy (served by @nestjs/serve-static on the backend) ────────
    location /uploads/ {
        proxy_pass         http://backend_api;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        # Cache images aggressively on the browser side
        proxy_cache_valid  200 1h;
    }

    # ── Static assets with long-term cache ───────────────────────────────────
    location /assets/ {
        try_files $uri =404;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # ── SPA fallback: all other routes → index.html ──────────────────────────
    location / {
        try_files $uri $uri/ /index.html;
    }
}
